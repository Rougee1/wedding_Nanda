# ─── HTTP : redirect vers HTTPS ──────────────────────────────────────────────
server {
    listen 80;
    server_name nandaredoine.com www.nandaredoine.com;
    return 301 https://$host$request_uri;
}

# ─── HTTPS : proxy vers le conteneur Next.js sur 3002 ────────────────────────
server {
    listen 443 ssl http2;
    server_name nandaredoine.com www.nandaredoine.com;

    # Certbot remplit ces lignes automatiquement lors du premier certbot --nginx
    ssl_certificate /etc/letsencrypt/live/nandaredoine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nandaredoine.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    # Le conteneur wedding-nanda écoute sur le port hôte 3002
    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
